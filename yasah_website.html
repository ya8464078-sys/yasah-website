
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASAH Handmade Keyrings</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:black;
color:silver;
}

header{
text-align:center;
padding:40px 20px;
border-bottom:1px solid #444;
}

header h1{
font-size:48px;
letter-spacing:6px;
margin:0;
}

header p{
font-size:18px;
color:#ccc;
}

nav{
text-align:center;
padding:15px;
background:#111;
}

nav a{
color:silver;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.product{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid #333;
}

.product img{
width:100%;
border-radius:8px;
}

button{
background:silver;
color:black;
border:none;
padding:10px 15px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #444;
color:#aaa;
}

</style>
</head>

<body>

<header>
<h1>YASAH</h1>
<p>Handmade Keyrings by Yasmeen & Sahiba</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#contact">Contact</a>
</nav>

<section id="shop" class="products">

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Heart Keyring</h3>
<p>₹199</p>
<button>Order</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Name Letter Keyring</h3>
<p>₹149</p>
<button>Order</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300">
<h3>Resin Flower Keyring</h3>
<p>₹249</p>
<button>Order</button>
</div>

</section>

<section id="contact" style="text-align:center;padding:40px;">
<h2>Contact Us</h2>
<p>Order on WhatsApp</p>
<p>Phone: +91XXXXXXXXXX</p>
</section>

<footer>
<p>© 2026 YASAH Handmade Keyrings</p>
</footer>

</body>
</html>
